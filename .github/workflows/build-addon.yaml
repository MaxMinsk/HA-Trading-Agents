name: Build add-on

# Reusable: builds one Home Assistant add-on (multi-arch) with the HA builder actions and, when
# inputs.push is true, publishes a multi-arch manifest to GHCR. Mirrors the HAMemory build pipeline.

on:
  workflow_call:
    inputs:
      addon_path:
        description: Path to the add-on folder (e.g. ./addon)
        required: true
        type: string
      push:
        description: Push images + manifest to the registry
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      description: ${{ steps.info.outputs.description }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.info.outputs.name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      url: ${{ steps.info.outputs.url }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ${{ inputs.addon_path }}

      - name: Normalize image name
        id: normalize
        env:
          RAW_IMAGE: ${{ steps.info.outputs.image }}
          RAW_VERSION: ${{ steps.info.outputs.version }}
        run: |
          image="${RAW_IMAGE}"
          image="${image%\"}"
          image="${image#\"}"

          version="${RAW_VERSION}"
          version="${version%\"}"
          version="${version#\"}"

          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Prepare multi-arch matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: .
          file: ${{ inputs.addon_path }}/Dockerfile
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            org.opencontainers.image.url=${{ needs.prepare.outputs.url }}
          push: ${{ inputs.push }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs:
      - prepare
      - build
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
