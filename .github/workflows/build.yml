name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build (warnings as errors)
        run: dotnet build Trading.sln -warnaserror

      - name: Test
        run: dotnet test Trading.sln --no-build --verbosity normal
