name: release

# Build and publish the Home Assistant add-on images (data/exec + agent) to GHCR on a v* tag.
# The image name + version come from each add-on's config.yaml; bump config.yaml versions before tagging.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: [addon, addon-agent]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Reads config.yaml (image + version) and build.yaml (base images); builds + pushes all arches.
      - name: Build and push ${{ matrix.addon }}
        uses: home-assistant/builder@master
        with:
          args: |
            --target ${{ matrix.addon }}
            --all
