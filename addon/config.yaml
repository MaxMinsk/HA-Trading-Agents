name: Trading Data MCP
version: "0.1.0"
slug: trading_mcp
description: Binance market-data layer (ingestion + SQLite) exposed over MCP for trading agents.
url: https://github.com/MaxMinsk/HA-Trading-Agents/tree/main/addon
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
# Cold backup so the WAL-mode SQLite DB under /data is captured as a consistent snapshot.
backup: cold
image: ghcr.io/maxminsk/ha-trading-agents
# Supervisor pings this unauthenticated liveness probe; a failure restarts the add-on.
watchdog: "http://[HOST]:[PORT:8080]/health"
ports:
  "8080/tcp": 8080
ports_description:
  "8080/tcp": MCP endpoint (/mcp), bearer-protected
options:
  db_path: "/data/market.sqlite"
  bearer_token: ""
  symbols: "BTCUSDT,ETHUSDT"
  interval: "1h"
  backfill_days: 30
  spot_klines_url: "https://data-api.binance.vision/api/v3/klines"
  log_level: "Information"
  # Execution (off by default). Paper needs no keys; binance defaults to the testnet unless binance_live.
  exec_enabled: false
  exec_mode: "paper"
  paper_quote: 10000
  binance_api_key: ""
  binance_api_secret: ""
  binance_live: false
  max_position_fraction: 0.25
  max_order_notional: 1000
  daily_loss_fraction: 0.05
  kill_switch: false
schema:
  db_path: str
  bearer_token: password?
  symbols: str
  interval: list(1h|4h|1d)
  backfill_days: int
  spot_klines_url: str?
  log_level: list(Trace|Debug|Information|Warning|Error)
  exec_enabled: bool
  exec_mode: list(paper|binance)
  paper_quote: float
  binance_api_key: password?
  binance_api_secret: password?
  binance_live: bool
  max_position_fraction: float
  max_order_notional: float
  daily_loss_fraction: float
  kill_switch: bool
